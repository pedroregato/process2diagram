    font-family: var(--serif);
    font-size: 320px;
    font-weight: 700;
    font-style: italic;
    color: rgba(255,255,255,.03);
    pointer-events: none;
    line-height: 1;

  .h-label {

    border-right: 1px solid var(--border);

    color: var(--dim); font-style: normal;
    margin-bottom: 8px; display: block;
  }
  .entry-tag {
    display: inline-block;
    font-family: var(--mono); font-size: 9px;
    letter-spacing: .1em; text-transform: uppercase;

  .entry-def em { font-style: italic; color: var(--muted); }

    background: var(--s2); border-left: 3px solid var(--border);
    padding: 10px 14px; margin-top: 10px;
    font-size: 12.5px; color: var(--muted);

    content: 'Exemplo: ';
    font-family: var(--mono); font-size: 9.5px;
    letter-spacing: .1em; text-transform: uppercase;
    color: var(--dim); font-style: normal; display: block;

  .er-label {
    font-family: var(--mono); font-size: 9.5px;
    letter-spacing: .1em; text-transform: uppercase; color: var(--dim);

  .er-link {
    font-family: var(--mono); font-size: 11px;
    color: var(--dev); text-decoration: underline;

  }

  @media (max-width: 720px) {
    header { padding: 32px 20px; }
    .search-bar, .filters { padding: 12px 18px; }
    .layout { grid-template-columns: 1fr; }
    nav { display: none; }
    .content { padding: 0 18px 48px; }
    .entry { grid-template-columns: 1fr; gap: 8px; }
  }
</style>

// ── RENDER ─────────────────────────────────────────────
let activeFilter = 'all';

function tagLabel(t) {
  const m = { ai:'AI & LLM', dev:'Desenvolvimento', met:'Metodologia', ux:'UX & Interface', gen:'Geral' };
  return m[t] || t;
}
function tagClass(t) {
  return 'tag-' + t;
}

function render(entries) {
  const content = document.getElementById('glossary-content');
  const noRes   = document.getElementById('no-results');

  // Limpa tudo exceto no-results
  Array.from(content.children).forEach(c => { if (c.id !== 'no-results') c.remove(); });

  if (entries.length === 0) {
    noRes.style.display = 'block';
    document.getElementById('result-count').textContent = '0 termos';
    return;
  }
  noRes.style.display = 'none';

  // Agrupa por letra
  const byLetter = {};
  entries.forEach(e => {
    const l = e.term[0].toUpperCase();
    if (!byLetter[l]) byLetter[l] = [];
    byLetter[l].push(e);
  });

  const letters = Object.keys(byLetter).sort();
  letters.forEach(letter => {
    const sec = document.createElement('div');
    sec.className = 'letter-section';
    sec.id = 'letter-' + letter;

    const heading = document.createElement('div');
    heading.className = 'letter-heading';
    heading.textContent = letter;
    sec.appendChild(heading);

    byLetter[letter].forEach(e => {
      const entry = document.createElement('div');
      entry.className = 'entry';
      entry.dataset.tag = e.tag;

      const related = e.related
        ? `<div class="entry-related">
            <span class="er-label">Ver também:</span>
            ${e.related.map(r => `<span class="er-link" onclick="searchTerm('${r}')">${r}</span>`).join('')}
           </div>`
        : '';

      const example = e.example
        ? `<div class="entry-example">${e.example}</div>`
        : '';

      entry.innerHTML = `
        <div class="entry-left">
          <div class="entry-term">${e.term}</div>
          <span class="entry-en">${e.en}</span>
          <span class="entry-tag ${tagClass(e.tag)}">${tagLabel(e.tag)}</span>
        </div>
        <div class="entry-right">
          <div class="entry-def">${e.def}</div>
          ${example}
          ${related}
        </div>`;

      sec.appendChild(entry);
    });

    content.insertBefore(sec, noRes);
  });

  // Nav lateral
  const nav = document.getElementById('nav-index');
  nav.innerHTML = '<div class="nav-label">Índice</div>';
  'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(l => {
    const a = document.createElement('a');
    a.className = 'nav-letter' + (byLetter[l] ? ' has-entries' : '');
    a.textContent = l;
    if (byLetter[l]) {
      a.onclick = () => document.getElementById('letter-' + l)?.scrollIntoView({ behavior: 'smooth' });
    }
    nav.appendChild(a);
  });

  document.getElementById('result-count').textContent =
    entries.length + ' termo' + (entries.length !== 1 ? 's' : '');
}

function buscar() {
  const q = document.getElementById('search').value.toLowerCase();
  let filtered = ENTRIES;
  if (activeFilter !== 'all') filtered = filtered.filter(e => e.tag === activeFilter);
  if (q) filtered = filtered.filter(e =>
    e.term.toLowerCase().includes(q) ||
    e.def.toLowerCase().includes(q) ||
    (e.example || '').toLowerCase().includes(q) ||
    (e.related || []).some(r => r.toLowerCase().includes(q))
  );
  render(filtered);
}

function filtrar(tag, btn) {
  activeFilter = tag;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buscar();
}

function searchTerm(term) {
  document.getElementById('search').value = term;
  activeFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.fb-all').classList.add('active');
  buscar();
  document.querySelector('.search-bar')?.scrollIntoView({ behavior: 'smooth' });
}

// Init
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('total-count').textContent = ENTRIES.length + ' verbetes';
  render(ENTRIES);
});
