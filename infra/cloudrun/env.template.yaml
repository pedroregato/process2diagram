# ─────────────────────────────────────────────────────────────────────────────
# infra/cloudrun/env.template.yaml
# Template de variáveis de ambiente — NÃO commitar com valores reais.
#
# Uso:
#   1. Copiar para .env (excluído pelo .dockerignore e .gitignore)
#   2. Ou criar os Secrets no Secret Manager e referenciar em service.yaml
#
# Criação de secret:
#   echo -n "valor" | gcloud secrets create NOME --data-file=-
# ─────────────────────────────────────────────────────────────────────────────

# ── Supabase ──────────────────────────────────────────────────────────────────
SUPABASE_URL: "https://<PROJECT_REF>.supabase.co"
SUPABASE_KEY: "<service_role_key>"           # nunca a anon key em produção

# ── LLM Providers ─────────────────────────────────────────────────────────────
DEEPSEEK_API_KEY: ""
ANTHROPIC_API_KEY: ""
OPENAI_API_KEY: ""
GROQ_API_KEY: ""
GOOGLE_API_KEY: ""
XAI_API_KEY: ""

# Fallback genérico: cobre provedores não mapeados individualmente em api.py
LLM_API_KEY: ""

# ── Google Cloud Platform ──────────────────────────────────────────────────────
GCP_PROJECT_ID: ""
GCP_REGION: "us-central1"

# ── Cloud Tasks (Fase 2 — substituição do threading.Lock) ─────────────────────
# Descomentar e preencher quando a migração para Cloud Tasks for executada.
# CLOUD_TASKS_QUEUE: "p2d-pipeline-queue"
# CLOUD_TASKS_LOCATION: "us-central1"

# ── Logging ───────────────────────────────────────────────────────────────────
LOG_LEVEL: "info"
PYTHONUNBUFFERED: "1"
PYTHONDONTWRITEBYTECODE: "1"
